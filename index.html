<!DOCTYPE html>

    <title>هيليوم العيد | Helium Eid</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #ffffff;

            padding: 20px;
        }

        /* تنسيق اللوجو */

        /* الزر الأصفر الأنيق */

            background: #f5d142; 
            color: #000000;
            text-decoration: none;
            padding: 18px 45px;
            margin-bottom: 15px;
            border-radius: 40px; 
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 10px 20px rgba(245, 209, 66, 0.2);
            transition: all 0.3s ease;
            width: 80%;
        }
        .btn:active { transform: scale(0.96); }

        /* الأزرار الرمادية الناعمة */
        .secondary-btn {
            background: #f5f5f7;
            color: #1d1d1f;
            box-shadow: none;
            font-size: 16px;
        }

        .footer { margin-top: 40px; font-size: 12px; color: #aeaeb2; }

</head>
