<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هيليوم العيد | Helium Eid</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; font-family: -apple-system, sans-serif; 
            background-color: #ffffff; margin: 0; padding: 20px;
        }
        .container { max-width: 500px; width: 100%; text-align: center; }
        
        /* زر المعاينة الأساسي - تم تغيير لونه لتمييزه */
        .btn-ar {
            display: inline-flex; align-items: center; justify-content: center;
            background: #000; color: #fff; text-decoration: none;
            padding: 20px 45px; margin-bottom: 20px; border-radius: 40px; 
            font-weight: bold; font-size: 18px; width: 85%; border: none; cursor: pointer;
        }

        /* نافذة التنبيه - ستكون ظاهرة لضمان رؤيتها */
        #tt-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999; padding: 30px; box-sizing: border-box;
        }
        .instruction-card {
            border: 2px solid #f5d142; padding: 20px; border-radius: 20px; text-align: center;
        }
        .arrow { font-size: 50px; text-align: left; display: block; animation: moveUp 1s infinite; }
        @keyframes moveUp { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div id="tt-overlay">
        <div class="arrow">↗️</div>
        <div class="instruction-card">
            <h2>خطوة واحدة متبقية! 🎈</h2>
            <p>لفتح الكاميرا والمعاينة، يرجى اتباع الآتي:</p>
            <div style="text-align: right; background: #f5f5f7; padding: 15px; border-radius: 10px;">
                1. اضغط على <b>النقاط الثلاث (•••)</b> بالأعلى.<br>
                2. اختر <b>فتح في المتصفح</b> أو <b>Open in Safari</b>.
            </div>
            <button onclick="document.getElementById('tt-overlay').style.display='none'" style="margin-top: 20px; background: none; border: 1px solid #ccc; padding: 10px; border-radius: 10px;">أنا في المتصفح بالفعل</button>
        </div>
    </div>

    <div class="container">
        <img src="logo.png" width="120" style="margin-bottom:20px;">
        <h1>بالونات العيد 🎈</h1>
        
        <a id="ar-link" rel="ar" href="HeliumEid.usdz" class="btn-ar">
             اضغط هنا للمعاينة 🤳
        </a>

        <a href="https://crlkll.zid.store/" style="display:block; margin-bottom:10px; color:#666;">اطلب من المتجر 🛒</a>
    </div>

    <script>
        // فحص المتصفح فوراً وبدون انتظار
        (function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var isTikTok = (ua.indexOf("TikTok") > -1) || (ua.indexOf("Instagram") > -1);
            
            if (isTikTok) {
                // إظهار التنبيه فوراً
                document.getElementById('tt-overlay').style.display = 'block';
            }
        })();

        // منع المتصفح من فتح الملف كنص إذا ضغط المستخدم وهو لا يزال داخل تيك توك
        document.getElementById('ar-link').addEventListener('click', function(e) {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            if ((ua.indexOf("TikTok") > -1)) {
                e.preventDefault(); // منع فتح الرابط (الذي يظهر ككود)
                document.getElementById('tt-overlay').style.display = 'block'; // إظهار التنبيه بدلاً منه
            }
        });
    </script>
</body>
</html>
