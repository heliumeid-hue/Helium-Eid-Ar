<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هيليوم العيد | Helium Eid</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; font-family: -apple-system, sans-serif; 
            background-color: #ffffff; margin: 0; padding: 20px;
        }
        .container { max-width: 500px; width: 100%; text-align: center; }
        .brand-logo { width: 120px; height: 120px; border-radius: 50%; margin-bottom: 20px; animation: float 3s infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        h1 { font-size: 28px; color: #1d1d1f; }
        .brand-story { font-size: 15px; color: #666; line-height: 1.8; margin-bottom: 25px; }

        /* أزرار الإجراء */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            background: #f5d142; color: #000; text-decoration: none;
            padding: 18px 45px; margin-bottom: 15px; border-radius: 40px; 
            font-weight: 600; font-size: 18px; width: 85%; border: none; cursor: pointer;
            box-shadow: 0 10px 20px rgba(245, 209, 66, 0.2);
        }
        .secondary-btn { background: #f5f5f7; color: #1d1d1f; box-shadow: none; font-size: 16px; }

        /* تنبيه تيك توك */
        #tiktok-helper {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98); z-index: 10000;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .tiktok-card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; width: 80%; }
        .arrow-up { font-size: 50px; position: absolute; top: 10px; right: 20px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div id="tiktok-helper">
        <div class="arrow-up">↗️</div>
        <div class="tiktok-card">
            <h2>رؤية البالونات في منزلك 🎈</h2>
            <p>متصفح التطبيق الحالي لا يدعم المعاينة.</p>
            <div style="text-align: right; background: #f9f9f9; padding: 15px; border-radius: 10px;">
                <p>1️⃣ اضغط على <b>النقاط الثلاث (•••)</b> بالأعلى.</p>
                <p>2️⃣ اختر <b>فتح في المتصفح</b> أو <b>Safari</b>.</p>
            </div>
            <button onclick="document.getElementById('tiktok-helper').style.display='none'" style="margin-top:15px; background:none; border:none; color:blue; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <div class="container">
        <img src="logo.png" alt="Logo" class="brand-logo" onerror="this.style.display='none'">
        <h1>بالونات العيد العملاقة 🎈</h1>
        <div class="brand-story">في <b>هيليوم عيد</b> نسجنا لكم من خيوط الذهب حروفاً تُعلن الفرح وتزين لقاءات العيد.</div>

        <button onclick="handleARClick()" class="btn">
            فتح المعاينة في منزلك 🤳
        </button>

        <a href="https://crlkll.zid.store/" class="btn secondary-btn">اطلب من المتجر 🛒</a>
        <a href="https://wa.me/966577493584" class="btn secondary-btn">الدعم الفني 💬</a>
    </div>

    <script>
        // 1. اكتشاف متصفح تيك توك أو إنستقرام
        function isRestrictedBrowser() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            return (ua.indexOf("TikTok") > -1) || (ua.indexOf("Instagram") > -1) || (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1);
        }

        // 2. معالجة الضغط على زر AR
        function handleARClick() {
            if (isRestrictedBrowser()) {
                document.getElementById('tiktok-helper').style.display = 'flex';
            } else {
                // إنشاء رابط AR برمجياً لمنع ظهور الكود النصي
                const arLink = document.createElement('a');
                arLink.setAttribute('rel', 'ar');
                // أضفنا متغير عشوائي لضمان عدم الكاش (Cache)
                arLink.setAttribute('href', 'HeliumEid.usdz?v=' + new Date().getTime());
                
                // إضافة صورة مخفية (متطلب أساسي لـ iOS Quick Look)
                const img = document.createElement('img');
                img.src = 'logo.png';
                arLink.appendChild(img);

                document.body.appendChild(arLink);
                arLink.click();
                document.body.removeChild(arLink);
            }
        }

        // إظهار التنبيه تلقائياً عند الدخول من تيك توك
        window.onload = function() {
            if (isRestrictedBrowser()) {
                document.getElementById('tiktok-helper').style.display = 'flex';
            }
        };
    </script>
</body>
</html>
