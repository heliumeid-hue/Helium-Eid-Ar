<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هيليوم العيد 🎈</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* هنا نضع الخلفية اللي كانت في التصميم القديم */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 350px;
            width: 90%;
            border: 2px solid #D4AF37;
        }

        .tiktok-hint {
            display: none;
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
        }

        h1 { color: #996515; margin-bottom: 10px; }
        
        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #D4AF37, #996515);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(153, 101, 21, 0.3);
            margin-top: 20px;
        }

        .secondary-btn {
            display: block;
            margin-top: 15px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (navigator.userAgent.includes("TikTok") || navigator.userAgent.includes("Snapchat")) {
                document.getElementById("tiktok-msg").style.display = "block";
            }
        });
    </script>
</head>
<body>

    <div class="container">
        <div id="tiktok-msg" class="tiktok-hint">
            🛑 إذا ما فتحت الكاميرا: اضغط الـ 3 نقاط فوق واختر <b>"فتح في المتصفح"</b>
        </div>
        
        <h2 style="margin:0;">🎈</h2>
        <h1>هيليوم العيد</h1>
        <p>جرب البالونات في صالتك الآن!</p>

        <a rel="ar" href="HeliumEid.usdz" class="btn">
            فتح المعاينة (AR) 🧊
        </a>

        <a href="https://crlkll.zid.store/" class="secondary-btn">زيارة المتجر للطلب 🛒</a>
    </div>

</body>
</html>
