<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاينة بالونات العيد</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            flex-direction: column; 
            font-family: sans-serif; 
            background-color: #f9f9f9; 
            margin: 0;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; font-size: 18px; }
        .ar-button { 
            padding: 20px 40px; 
            background: #FFD700; 
            border-radius: 50px; 
            text-decoration: none; 
            color: #000; 
            font-weight: bold; 
            font-size: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            transition: 0.3s; 
        }
        .ar-button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <h1>بالونات العيد العملاقة 🎈</h1>
    <p>اضغط على الزر وشوفها في صالتك!</p>
    
    <a rel="ar" href="HeliumEid.usdz" class="ar-button">
        فتح المعاينة في منزلك 🤳
    </a>

</html>
