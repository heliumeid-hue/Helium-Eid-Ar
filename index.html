<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <title>هيليوم العيد | Helium Eid</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #ffffff; 
            margin: 0; 
            padding: 20px;
        }
        .container { max-width: 400px; width: 100%; text-align: center; }
        
        h1 { font-size: 28px; color: #1d1d1f; margin-bottom: 12px; font-weight: 600; }
        p { font-size: 16px; color: #86868b; margin-bottom: 40px; line-height: 1.5; }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f5d142; /* اللون الأصفر المماثل للصورة */
            color: #000000;
            text-decoration: none;
            padding: 18px 35px;
            margin-bottom: 20px;
            border-radius: 40px; /* زوايا منحنية بالكامل */
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 10px 20px rgba(245, 209, 66, 0.2);
            transition: all 0.3s ease;
            width: 80%;
        }
        .btn:active { transform: scale(0.96); }

        /* زر المتجر والواتساب بتصميم أنيق وبسيط */
        .secondary-btn {
            background: #f5f5f7;
            color: #1d1d1f;
            box-shadow: none;
            font-size: 16px;
        }

        .footer { margin-top: 50px; font-size: 13px; color: #aeaeb2; }
    </style>
</head>
